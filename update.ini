Расширение горячих клавиш:
U - Быстрая вставка ключей (/key).
ALT + E - Открытие меню лидера (/lmenu).
ALT + T - Открытие меню семьи (/fammenu).
ALT + J - Просмотр информации о бизнесе (/bizinfo).
ALT + H - Просмотр информации о доме (/house).
Управление биндами: Добавлена команда /binds, которая полностью отключает или включает реакцию на горячие клавиши 
(включая клавишу Q), чтобы они не мешали при вводе текста вне игрового чата. Статус сохраняется в конфиг.

