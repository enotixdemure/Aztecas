SellRank v1.6 - Update Log

Добавлена команда /srul: Создана новая автоматизированная команда для озвучивания правил покупки ранга. Правила выводятся с безопасной задержкой, чтобы обойти антифлуд-систему сервера и исключить появление ошибки «Не флуди!».
Глобальный ребрендинг: Скрипт полностью переписан и теперь называется AzTools вместо SellRank, так как его возможности стали гораздо шире простой продажи рангов. Код был полностью оптимизирован изнутри для более быстрой и стабильной работы.

