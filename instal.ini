Короткая инструкция по установке:

Скачайте:
https://drive.google.com/file/d/18tuPB-fLVqwCgxRsCgGUIl1GPL2gTgDE/view?usp=sharing

Библиотеки: Содержимое папки lib из архива FoxLog.rar перенесите в папку игры moonloader/lib.  
Скрипт: Из архива файл: sellrank.luac в папку moonloader.
Скрипт: Из архива файл: foxlog.luac в папку moonloader.
Конфиг: Папку FoxLog из архива FoxLog.rar перенесите в папку игры moonloader.

Проверка: Зайдите в игру. В чате должна появиться зеленая надпись о запуске от Raccoon.
Важно: У вас должен быть заранее установлен MoonLoader 0.26. Для вывода списка команд в игре используйте /cmd и /fl
